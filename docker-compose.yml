services:
  mongo1:
    image: mongo:8.3.1
    container_name: mongo1
    hostname: mongo1
    restart: unless-stopped
    command: [ "mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27017" ]
    volumes:
      - ./data/mongo-1:/data/db
    ports:
      - "${MONGO1_PORT}:${MONGO1_PORT}"
    networks:
      - net

  mongo2:
    image: mongo:8.3.1
    container_name: mongo2
    hostname: mongo2
    restart: unless-stopped
    command: [ "mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27018" ]
    volumes:
      - ./data/mongo-2:/data/db
    ports:
      - "${MONGO2_PORT}:${MONGO2_PORT}"
    networks:
      - net

  mongo3:
    image: mongo:8.3.1
    container_name: mongo3
    hostname: mongo3
    restart: unless-stopped
    command: [ "mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27019" ]
    volumes:
      - ./data/mongo-3:/data/db
    ports:
      - "${MONGO3_PORT}:${MONGO3_PORT}"
    networks:
      - net

  mongo-init:
    image: mongo:8.3.1
    container_name: mongo-init
    restart: "no"
    depends_on:
      - mongo1
      - mongo2
      - mongo3
    entrypoint:
      - bash
      - -lc
      - |
        echo "Waiting for Mongo nodes..."
        until mongosh --host mongo1 --port 27017 --eval "db.runCommand({ ping: 1 })" >/dev/null 2>&1; do sleep 2; done
        until mongosh --host mongo2 --port 27018 --eval "db.runCommand({ ping: 1 })" >/dev/null 2>&1; do sleep 2; done
        until mongosh --host mongo3 --port 27019 --eval "db.runCommand({ ping: 1 })" >/dev/null 2>&1; do sleep 2; done

        echo "Initializing replica set if needed..."
        mongosh --host mongo1 --port 27017 --eval '
          try {
            rs.status();
            print("Replica set already initialized");
          } catch (e) {
            rs.initiate({
              _id: "rs0",
              members: [
                { _id: 0, host: "mongo1:27017" },
                { _id: 1, host: "mongo2:27018" },
                { _id: 2, host: "mongo3:27019" }
              ]
            });
          }
        '

        echo "Waiting for replica set connection..."
        until mongosh "mongodb://mongo1:27017,mongo2:27018,mongo3:27019/?replicaSet=rs0" \
          --eval "db.adminCommand({ ping: 1 })" >/dev/null 2>&1; do
          sleep 2
        done

        echo "Replica set ready"
    networks:
      - net

  app:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: app
    restart: on-failure:5
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      mongo-init:
        condition: service_completed_successfully

    ports:
      - "8080:8080"
    environment:
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    networks:
      - net

networks:
  net:
    driver: bridge