name: ci pipeline

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:
  workflow_call:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build (package)
        run: mvn clean package --batch-mode --no-transfer-progress -DskipTests

      - name: Run unit tests
        run: >
          mvn test
          --batch-mode
          --no-transfer-progress
          -Djacoco.dataFile=target/jacoco-unit.exec
          -Djacoco.skip.check=true

      - name: Run integration webflux slice tests
        run: >
          mvn failsafe:integration-test failsafe:verify
          -P it-handlers
          --batch-mode
          --no-transfer-progress
          -Djacoco.dataFile=target/jacoco-handlers.exec
          -Djacoco.skip.check=true

      - name: Run integration testcontainers
        run: >
          mvn failsafe:integration-test failsafe:verify
          -P it-testcontainers
          --batch-mode
          --no-transfer-progress
          -Djacoco.dataFile=target/jacoco-testcontainers.exec
          -Djacoco.skip.check=true

      - name: Merge JaCoCo exec files
        run: >
          mvn jacoco:merge
          --batch-mode
          --no-transfer-progress
          -Djacoco.destFile=target/jacoco.exec

      - name: Generate JaCoCo report
        run: >
          mvn jacoco:report
          --batch-mode
          --no-transfer-progress
          -Djacoco.dataFile=target/jacoco.exec

      - name: Check JaCoCo coverage
        run: >
          mvn jacoco:check
          --batch-mode
          --no-transfer-progress
          -Djacoco.skip.check=false

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: target/site/jacoco/jacoco.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}